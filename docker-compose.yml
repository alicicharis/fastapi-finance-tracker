version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: postgres_fastapi_finance_tracker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_fastapi_finance_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
